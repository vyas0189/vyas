[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--no-audit --no-fund"

[functions]
  node_bundler = "esbuild"

# Long-cache hashed Astro assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Block source maps from public access (defense in depth — they should also be deleted post-upload by Sentry)
[[headers]]
  for = "/_astro/*.map"
  [headers.values]
    X-Robots-Tag = "noindex"
    Cache-Control = "no-store"

# Site-wide security headers (moved here from middleware.ts; CSP stays in middleware)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Block indexing of preview deploys
[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"
