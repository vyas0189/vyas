name: Uptime check

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: uptime
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping production
        id: ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://vyasr.com/)
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Site returned HTTP $STATUS"
            exit 1
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Uptime check failed: ${new Date().toISOString().slice(0, 16)}Z`;
            const body = [
              `The hourly uptime check against https://vyasr.com/ failed.`,
              ``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Time:** ${new Date().toISOString()}`,
            ].join('\n');
            // Dedupe: don't open a new issue if one is already open with the same prefix today
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'uptime',
            });
            const todayPrefix = `Uptime check failed: ${new Date().toISOString().slice(0, 10)}`;
            const dupe = existing.data.find(i => i.title.startsWith(todayPrefix));
            if (dupe) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dupe.number,
                body,
              });
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['uptime', 'incident'],
            });
