name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'PROMPT.md']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'PROMPT.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22"

jobs:
  build-and-test:
    name: Build and Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run check

      - name: Run unit tests
        run: npm run test:unit

      - name: Build project
        run: npm run build
        env:
          PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          PUBLIC_COMMIT_REF: ${{ github.sha }}
          PUBLIC_DEPLOY_CONTEXT: production

      - name: Bundle size check
        run: npm run size

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: netlify-build
          path: |
            .netlify/
            dist/
          retention-days: 1

  deploy:
    name: Deploy to Netlify
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_url: ${{ steps.netlify-deploy.outputs.deploy_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: netlify-build

      - name: Verify build artifacts
        run: |
          echo "Contents of .netlify folder:"
          ls -la .netlify/ || echo "No .netlify folder"
          echo "Contents of dist folder:"
          ls -la dist/ || echo "No dist folder"

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        id: netlify-deploy
        run: |
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          prod_flag=""
          if [ "$BRANCH_NAME" = "main" ]; then prod_flag="--prod"; fi

          netlify deploy \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_AUTH_TOKEN }} \
            $prod_flag \
            --json \
            > deploy_output.json

          cat deploy_output.json

          # Extract deploy URL
          DEPLOY_URL=$(cat deploy_output.json | jq -r '.deploy_url // .url')
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

  e2e-tests:
    name: E2E Tests
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: pw-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for deploy to be live
        run: |
          URL="${{ needs.deploy.outputs.deploy_url }}"
          for i in {1..30}; do
            if curl -fsS --max-time 5 "$URL" >/dev/null; then
              echo "Deploy is live at $URL"
              exit 0
            fi
            echo "Attempt $i: not yet ready, waiting 2s..."
            sleep 2
          done
          echo "::error::Deploy did not become reachable within 60s"
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: ${{ needs.deploy.outputs.deploy_url }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  comment-pr:
    name: Comment on PR
    if: github.event_name == 'pull_request' && always()
    needs: [deploy, e2e-tests]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: deploy-status
          message: |
            ### Deploy & test results
            - Deploy: ${{ needs.deploy.result }}
            - E2E: ${{ needs.e2e-tests.result }}
            - Preview: ${{ needs.deploy.outputs.deploy_url }}

  lighthouse:
    needs: [deploy, e2e-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@latest autorun \
            --collect.url=${{ needs.deploy.outputs.deploy_url }} \
            --collect.url=${{ needs.deploy.outputs.deploy_url }}/about \
            --collect.url=${{ needs.deploy.outputs.deploy_url }}/contact
